name: Lariat CI/CD

on:
  repository_dispatch:
    types: [dispatch_push, dispatch_pull_request, dispatch_merge]

jobs:
  test:
    runs-on: self-hosted
    steps:
      - name: Run tests
        run: |
          echo "Running tests..."

  apps:
    if: github.event.action == 'dispatch_push' || github.event.action == 'dispatch_merge'
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Build and deploy
        run: |
          echo "Building apps on ${{ matrix.os }}..."

  deploy:
    if: github.event.action == 'dispatch_merge'
    needs: apps
    runs-on: self-hosted
    steps:
      - name: Deploy to production
        run: |
          echo "Deploying to production..."