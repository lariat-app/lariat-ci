name: Lariat CI/CD

on:
  repository_dispatch:
    types: [dispatch_push, dispatch_pull_request, dispatch_merge]

jobs:
  test:
    runs-on: self-hosted
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        repository: lariat-app/lariat-dev
        token: ${{ secrets.LARIAT_CI }}
        ref: ${{ github.event.client_payload.ref || 'master' }}

    - name: CMake Build
      run: |
        cmake -S . -B /home/ubuntu/build_test -DBUILD_TEST=ON -DVCPKG_ROOT=/home/ubuntu/vcpkg
        cmake --build /home/ubuntu/build_test -j 8

    - name: Run tests
      run: |
        ctest --test-dir /home/ubuntu/build_test

  apps:
    if: github.event.action == 'dispatch_pull_request' || github.event.action == 'dispatch_merge'
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Build and deploy
        run: |
          echo "Building apps on ${{ matrix.os }}..."

  deploy:
    if: github.event.action == 'dispatch_merge'
    needs: apps
    runs-on: self-hosted
    steps:
      - name: Deploy to production
        run: |
          echo "Deploying to production..."
