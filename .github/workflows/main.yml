name: Lariat CI/CD

on:
  workflow_dispatch:
    inputs:
      dispatch_type:
        description: 'The type of dispatch event to simulate'
        type: choice
        required: true
        default: 'dispatch_push'
        options:
          - dispatch_push
          - dispatch_pull_request
          - dispatch_merge

  repository_dispatch:
    types: [dispatch_push, dispatch_pull_request, dispatch_merge]

jobs:
  test:
    runs-on: self-hosted
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        repository: lariat-app/lariat-dev
        token: ${{ secrets.LARIAT_CI }}
        ref: ${{ github.event.client_payload.ref || 'master' }}

    - name: CMake Build
      run: |
        cmake -S . -B /home/ubuntu/build_test -DBUILD_TEST=ON -DVCPKG_ROOT=/home/ubuntu/vcpkg
        cmake --build /home/ubuntu/build_test -j 8

    - name: Run tests
      run: |
        ctest --test-dir /home/ubuntu/build_test

  apps:
    if: github.event.action == 'dispatch_pull_request' || github.event.action == 'dispatch_merge' || github.event.inputs.dispatch_type == 'dispatch_pull_request' || github.event.inputs.dispatch_type == 'dispatch_merge'
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    env: 
      VCPKG_BINARY_SOURCES: >-
        clear;http,http://${{secrets.TS_IPV4}}:12345/vcpkg-cache,readwrite
      CEF_URL: http://${{secrets.TS_IPV4}}:12345
  
    steps:
    - name: Tailscale connect
      uses: tailscale/github-action@v4
      with:
        oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
        oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
        tags: tag:ci
    
    - name: Ubuntu packages
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y autoconf autoconf-archive automake libtool libltdl-dev libx11-dev libxft-dev libxext-dev libgles2-mesa-dev libxi-dev libxtst-dev libxrandr-dev

    - name: Checkout vcpkg
      uses: actions/checkout@v4
      with:
        repository: microsoft/vcpkg
        path: vcpkg
        ref: '2026.01.16'  

    - name: Checkout code
      uses: actions/checkout@v4
      with:
        repository: lariat-app/lariat-dev
        token: ${{ secrets.LARIAT_CI }}
        path: lariat-dev
        ref: ${{ github.event.client_payload.ref || 'master' }}

    - name: Build
      run: |
        cd lariat-dev
        cmake -S . -B build -DVCPKG_ROOT=${{ github.workspace }}/vcpkg -DBUILD_APPS=ON
        cmake --build build -j 8

  cloud:
    if: github.event.action == 'dispatch_pull_request' || github.event.inputs.dispatch_type == 'dispatch_pull_request'
    needs: test
    runs-on: self-hosted
    steps:
      - name: Deploy to cloud
        run: |
          echo "Deploying to cloud..."


  publish:
    if: github.event.action == 'dispatch_merge' || github.event.inputs.dispatch_type == 'dispatch_merge'
    needs: apps
    runs-on: ubuntu-latest
    steps:
      - name: Publish to package registry
        run: |
          echo "Publishing artifacts"

  deploy:
    if: github.event.action == 'dispatch_merge' || github.event.inputs.dispatch_type == 'dispatch_merge'
    needs: cloud
    runs-on: self-hosted
    steps:
      - name: Deploy to production
        run: |
          echo "Deploying to production"
